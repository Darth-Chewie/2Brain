<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Blocks</title>
    <style>
        .block {
            margin: 10px;
            padding: 20px;
            background-color: skyblue;
            border: 1px solid #000;
            cursor: pointer;
        }

        #drop-area {
            margin: 10px;
            padding: 20px;
            border: 2px dashed grey;
            min-height: 100px;
        }
    </style>
</head>
<body>

<div id="block-container">
    
    
    
</div>

<div id="drop-area">
    <p>Drop blocks here</p>
<div class="block" draggable="true" id="block3">Block 3<div class="block" draggable="true" id="block2">Block 2</div></div><div class="block" draggable="true" id="block1">Block 1</div></div>

<script>
    document.querySelectorAll('.block').forEach(block => {
        block.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', e.target.id);
        });
    });

    document.getElementById('drop-area').addEventListener('dragover', e => {
        e.preventDefault(); // Necessary to allow the drop
    });

    document.getElementById('drop-area').addEventListener('drop', e => {
        e.preventDefault();
        const data = e.dataTransfer.getData('text/plain');
        const block = document.getElementById(data);
        e.target.appendChild(block);
    });
</script>



</body></html>
